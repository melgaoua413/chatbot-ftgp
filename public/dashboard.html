<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Chatbot FTGP</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F7F9FF; color:#160B47; min-height:100vh; }
  .header { background:linear-gradient(135deg,#0045B3,#160B47); padding:20px 32px; display:flex; align-items:center; gap:16px; }
  .header img { width:36px; height:36px; }
  .header h1 { color:white; font-size:18px; font-weight:700; }
  .header span { color:rgba(255,255,255,.65); font-size:13px; margin-left:auto; }
  .container { max-width:1100px; margin:0 auto; padding:32px 24px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:32px; }
  .card { background:white; border-radius:16px; padding:20px 24px; box-shadow:0 2px 12px rgba(22,11,71,.08); }
  .card .label { font-size:12px; color:#9BA8C0; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
  .card .value { font-size:32px; font-weight:700; color:#0045B3; }
  .card .sub { font-size:12px; color:#9BA8C0; margin-top:4px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:24px; }
  @media(max-width:700px){ .grid2{ grid-template-columns:1fr; } }
  .box { background:white; border-radius:16px; padding:24px; box-shadow:0 2px 12px rgba(22,11,71,.08); }
  .box h2 { font-size:15px; font-weight:700; color:#160B47; margin-bottom:16px; }
  .kw-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .kw-word { font-size:13px; font-weight:600; color:#160B47; min-width:120px; }
  .kw-bar-wrap { flex:1; background:#EEF2FF; border-radius:20px; height:8px; }
  .kw-bar { background:linear-gradient(90deg,#0045B3,#3B82F6); height:8px; border-radius:20px; transition:width .6s; }
  .kw-count { font-size:12px; color:#9BA8C0; min-width:24px; text-align:right; }
  .day-chart { display:flex; align-items:flex-end; gap:6px; height:80px; margin-top:8px; }
  .day-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; }
  .day-bar { width:100%; background:linear-gradient(180deg,#0045B3,#3B82F6); border-radius:4px 4px 0 0; min-height:4px; transition:height .6s; }
  .day-label { font-size:10px; color:#9BA8C0; white-space:nowrap; }
  .day-val { font-size:10px; color:#0045B3; font-weight:600; }
  .recent-item { padding:12px 0; border-bottom:1px solid #EEF2FF; }
  .recent-item:last-child { border-bottom:none; }
  .recent-q { font-size:13px; font-weight:600; color:#160B47; margin-bottom:4px; }
  .recent-a { font-size:12px; color:#6B7A9F; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .recent-time { font-size:11px; color:#9BA8C0; margin-top:4px; }
  .refresh { background:none; border:1.5px solid #0045B3; color:#0045B3; border-radius:10px; padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .refresh:hover { background:#0045B3; color:white; }
  .loading { text-align:center; padding:60px; color:#9BA8C0; font-size:15px; }
  .error { text-align:center; padding:40px; color:#EF4444; }
</style>
</head>
<body>
<div class="header">
  <img src="https://cdn.prod.website-files.com/64a34e8457fd12c08b34c521/64a4ab096ba779243f76749a_coque.svg" alt="FTGP"/>
  <h1>Dashboard Chatbot FTGP</h1>
  <span id="last-update">Chargement...</span>
  <button class="refresh" onclick="loadData()">↻ Actualiser</button>
</div>

<div class="container">
  <div id="content"><div class="loading">Chargement des données...</div></div>
</div>

<script>
var API = "https://chatbot-ftgp.vercel.app/api/dashboard";

function timeAgo(iso) {
  var d = new Date(iso);
  var now = new Date();
  var diff = Math.floor((now - d) / 60000);
  if (diff < 1) return "à l'instant";
  if (diff < 60) return diff + " min";
  if (diff < 1440) return Math.floor(diff/60) + "h";
  return Math.floor(diff/1440) + "j";
}

function formatDate(iso) {
  var d = new Date(iso);
  return ("0"+d.getDate()).slice(-2)+"/"+("0"+(d.getMonth()+1)).slice(-2);
}

function loadData() {
  document.getElementById("last-update").textContent = "Actualisation...";
  fetch(API)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      document.getElementById("last-update").textContent = "Mis à jour à " + new Date().toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"});
      render(d);
    })
    .catch(function() {
      document.getElementById("content").innerHTML = '<div class="error">Erreur de chargement. Vérifie que l\'API est accessible.</div>';
    });
}

function render(d) {
  // Calcul max pour les barres
  var days = Object.entries(d.byDay || {}).sort(function(a,b){ return a[0]>b[0]?1:-1; });
  var maxDay = Math.max(1, Math.max.apply(null, days.map(function(x){ return x[1]; })));
  var maxKw  = d.topKeywords && d.topKeywords.length ? d.topKeywords[0][1] : 1;

  var html =
    '<div class="cards">' +
      '<div class="card"><div class="label">Total conversations</div><div class="value">'+(d.total||0)+'</div><div class="sub">Depuis le début</div></div>' +
      '<div class="card"><div class="label">Cette semaine</div><div class="value">'+(d.week||0)+'</div><div class="sub">7 derniers jours</div></div>' +
      '<div class="card"><div class="label">Aujourd\'hui</div><div class="value">'+(d.byDay[new Date().toISOString().split("T")[0]]||0)+'</div><div class="sub">'+new Date().toLocaleDateString("fr-FR")+'</div></div>' +
      '<div class="card"><div class="label">Mots-clés analysés</div><div class="value">'+(d.topKeywords?d.topKeywords.length:0)+'</div><div class="sub">Top thèmes détectés</div></div>' +
    '</div>' +

    '<div class="grid2">' +
      '<div class="box"><h2>📅 Activité des 7 derniers jours</h2>' +
        '<div class="day-chart">' +
          days.map(function(e){
            var h = Math.round((e[1]/maxDay)*72);
            return '<div class="day-bar-wrap">'+
              '<div class="day-val">'+e[1]+'</div>'+
              '<div class="day-bar" style="height:'+h+'px"></div>'+
              '<div class="day-label">'+formatDate(e[0])+'</div>'+
            '</div>';
          }).join("") +
        '</div>' +
      '</div>' +

      '<div class="box"><h2>🔥 Mots-clés les plus fréquents</h2>' +
        (d.topKeywords||[]).slice(0,10).map(function(e){
          var pct = Math.round((e[1]/maxKw)*100);
          return '<div class="kw-item">'+
            '<span class="kw-word">'+e[0]+'</span>'+
            '<div class="kw-bar-wrap"><div class="kw-bar" style="width:'+pct+'%"></div></div>'+
            '<span class="kw-count">'+e[1]+'</span>'+
          '</div>';
        }).join("") +
      '</div>' +
    '</div>' +

    '<div class="box"><h2>💬 Dernières conversations</h2>' +
      (d.recent||[]).map(function(r){
        return '<div class="recent-item">'+
          '<div class="recent-q">'+r.question+'</div>'+
          '<div class="recent-a">'+r.answer+'</div>'+
          '<div class="recent-time">'+timeAgo(r.created_at)+'</div>'+
        '</div>';
      }).join("") +
    '</div>';

  document.getElementById("content").innerHTML = html;
}

loadData();
</script>
</body>
</html>
