  if(!had)addWelcome();if(!had)renderSuggs();else suggsGone=true;
  langFr.classList.toggle("active",lang==="fr");langEn.classList.toggle("active",lang==="en");
  input.placeholder=lang==="en"?"Ask your question...":"Pose ta question...";
  setTimeout(function(){if(bubble)bubble.style.display="none";},6000);

  function openChat(){box.style.display="flex";setTimeout(function(){box.classList.add("open");},10);isOpen=true;input.focus();msgs.scrollTop=msgs.scrollHeight;if(bubble)bubble.style.display="none";}
  function closeChat(){box.classList.remove("open");setTimeout(function(){box.style.display="none";},280);isOpen=false;}
  btn.onclick=function(){isOpen?closeChat():openChat();};
  bubble.onclick=openChat;
  closeBtn.onclick=closeChat;
  expandBtn.onclick=function(){isExpanded=!isExpanded;box.classList.toggle("expanded",isExpanded);expandBtn.textContent=isExpanded?"⤡":"⤢";};
  clearBtn.onclick=function(){if(confirm("Effacer toute la conversation ?"))clearAll();};

  var recog=null;
  if("webkitSpeechRecognition"in window||"SpeechRecognition"in window){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;recog=new SR();recog.continuous=false;recog.interimResults=true;recog.onstart=function(){micBtn.classList.add("listening");input.placeholder="🎤 Parle... puis clique Envoyer";};recog.onresult=function(e){var t="";for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;input.value=t;if(e.results[e.results.length-1].isFinal){micBtn.classList.remove("listening");input.placeholder=lang==="en"?"Ask your question...":"Pose ta question...";input.focus();}};recog.onerror=recog.onend=function(){micBtn.classList.remove("listening");input.placeholder=lang==="en"?"Ask your question...":"Pose ta question...";};micBtn.onclick=function(){micBtn.classList.contains("listening")?recog.stop():(recog.lang=lang==="en"?"en-US":"fr-FR",recog.start());};}else{micBtn.style.display="none";}

  function md(t){return t.replace(/^### (.+)$/gm,"<div style='font-weight:700;font-size:13px;color:#160B47;margin:8px 0 4px'>$1</div>").replace(/^## (.+)$/gm,"<div style='font-weight:700;font-size:14px;color:#0045B3;margin:10px 0 4px;border-bottom:1px solid #EEF2FF;padding-bottom:4px'>$1</div>").replace(/^# (.+)$/gm,"<div style='font-weight:700;font-size:15px;color:#160B47;margin:10px 0 6px'>$1</div>").replace(/^---+$/gm,"<hr style='border:none;border-top:1px solid #EEF2FF;margin:8px 0'/>").replace(/\*\*\[([^\]]+)\]\(([^)]+)\)\*\*/g,'<a href="$2" target="_blank" rel="noopener"><strong>$1</strong></a>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>').replace(/\*\*\*([^*]+)\*\*\*/g,"<strong><em>$1</em></strong>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*\n]+)\*/g,"<em>$1</em>").replace(/^[•\-]\s+(.+)$/gm,"<li>$1</li>").replace(/(<li>[^<]*<\/li>\n?)+/g,function(m){return "<ul style='margin:6px 0 4px 16px;padding:0'>"+m+"</ul>";}).replace(/\n/g,"<br>");}

  function makeReacts(id){
    var wrap=document.createElement("div");wrap.className="ftgp-reacts";
    var likeBtn=document.createElement("button");likeBtn.type="button";likeBtn.className="ftgp-rbtn";likeBtn.textContent="👍";
    var disBtn=document.createElement("button");disBtn.type="button";disBtn.className="ftgp-rbtn";disBtn.textContent="👎";
    likeBtn.onclick=function(){
      if(likeBtn.dataset.used)return;likeBtn.dataset.used="1";
      likeBtn.classList.add("liked");disBtn.disabled=true;disBtn.style.opacity="0.3";
      var happy=document.createElement("div");happy.className="ftgp-fm bot";
      happy.innerHTML='<div class="bubble" style="background:#DCFCE7;border-radius:18px 18px 18px 4px;box-shadow:0 2px 8px rgba(0,0,0,.07);font-size:14px;color:#166534;padding:11px 14px">😊 Ravie d\'avoir pu t\'aider ! N\'hésite pas si tu as d\'autres questions.</div>';
      msgs.appendChild(happy);msgs.scrollTop=msgs.scrollHeight;
    };
    disBtn.onclick=function(){
      if(disBtn.dataset.used)return;disBtn.dataset.used="1";
      disBtn.classList.add("disliked");likeBtn.disabled=true;likeBtn.style.opacity="0.3";
      var wrap2=document.getElementById("ftgp-m"+id);
      var q=wrap2?(wrap2.dataset.q||""):"";
      var a=wrap2?(wrap2.dataset.a||""):"";
      startRefine(id,q,[],1,a,false);
    };
    wrap.appendChild(likeBtn);wrap.appendChild(disBtn);return wrap;
  }

  function buildCard(p){return '<div class="ftgp-card"><div class="ftgp-card-head" style="background:'+p.color+'"><span style="font-size:20px">'+p.icon+'</span><span class="ftgp-card-title">'+p.name+'</span></div><div class="ftgp-card-body"><div class="ftgp-card-desc">'+p.desc+'</div><div class="ftgp-card-tags">'+p.tags.map(function(t){return'<span class="ftgp-tag">'+t+'</span>';}).join("")+'</div><a href="'+p.url+'" target="_blank" class="ftgp-card-btn" style="background:'+p.color+'">'+p.cta+' →</a></div></div>';}

  function buildCards(){var h='<div style="font-size:11px;font-weight:700;color:#9BA8C0;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">🇫🇷 Programmes nationaux</div>';h+='<div class="ftgp-cards">'+PROG_NAT.map(buildCard).join("")+'</div>';h+='<div style="font-size:11px;font-weight:700;color:#9BA8C0;letter-spacing:1px;text-transform:uppercase;margin:14px 0 6px">📍 Programmes French Tech Grand Paris</div>';h+='<div class="ftgp-cards">'+PROG_LOCAL.map(buildCard).join("")+'</div>';return h;}

  function buildContact(){return '<div style="background:linear-gradient(135deg,#F8FAFF,#EEF2FF);border:1.5px solid #C8D8F8;border-radius:16px;padding:14px 16px;width:100%;display:flex;flex-direction:column;gap:12px;box-sizing:border-box"><div style="display:flex;align-items:center;gap:10px"><div style="width:42px;height:42px;border-radius:12px;background:#fff;border:1.5px solid #C8D8F8;display:flex;align-items:center;justify-content:center;flex-shrink:0"><img src="https://cdn.prod.website-files.com/64a34e8457fd12c08b34c521/64a4ab096ba779243f76749a_coque.svg" style="width:28px;height:28px;object-fit:contain" alt="FTGP"/></div><div><div style="font-weight:700;font-size:14px;color:#160B47">Besoin d\'un contact humain ?</div><div style="font-size:12px;color:#6B7A9F;margin-top:2px">Notre équipe répond rapidement</div></div></div><a href="mailto:contact@frenchtech-grandparis.com" style="display:block;background:linear-gradient(135deg,#0045B3,#160B47);color:#fff;text-decoration:none;text-align:center;padding:10px;border-radius:11px;font-weight:700;font-size:13px">Contactez directement ici <span style="opacity:.8;font-weight:400">(répondent rapidement)</span></a><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:1px;background:#C8D8F8"></div><span style="font-size:11px;color:#9BA8C0;white-space:nowrap">Entre temps</span><div style="flex:1;height:1px;background:#C8D8F8"></div></div><a href="https://airtable.com/appv5cXO7MVspaMp8/pagjnriyF9NFBDfxJ/form" target="_blank" style="display:block;background:#fff;border:1.5px solid #0045B3;color:#0045B3;text-decoration:none;text-align:center;padding:10px;border-radius:11px;font-weight:700;font-size:13px">Remplir le formulaire →</a></div>';}

  function isProgs(t){return /quels.{0,20}programmes|liste.{0,15}programme|tous les programmes|nos programmes|vos programmes|que proposez|c.est quoi vos programmes/i.test(norm(t.toLowerCase()));}

  function addBot(html,showCards,question){mid++;var id=mid;var w=document.createElement("div");w.className="ftgp-fm bot"+(showCards?" full":"");w.id="ftgp-m"+id;w.dataset.q=question||"";w.dataset.a=html;w.dataset.dislikes="0";var b=document.createElement("div");b.className="bubble";b.innerHTML=md(html);var m=document.createElement("div");m.className="meta";m.textContent=getTime();w.appendChild(b);w.appendChild(m);w.appendChild(makeReacts(id));if(showCards){var cd=document.createElement("div");cd.innerHTML=buildCards();while(cd.firstChild)w.appendChild(cd.firstChild);}msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;save();}

  function addUser(text){mid++;var id=mid;var w=document.createElement("div");w.className="ftgp-fm user";w.id="ftgp-m"+id;w.dataset.text=text;var b=document.createElement("div");b.className="bubble";b.textContent=text;var m=document.createElement("div");m.className="meta";var eb=document.createElement("button");eb.className="ftgp-editbtn";eb.textContent="✏️ Modifier";eb.onclick=function(){var ew=document.getElementById("ftgp-m"+id);if(ew){input.value=ew.dataset.text||"";ew.remove();input.focus();}};m.appendChild(eb);m.appendChild(document.createTextNode(getTime()));w.appendChild(b);w.appendChild(m);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;}

  function addOrb(){var o=document.createElement("div");o.className="ftgp-orb-wrap";o.id="ftgp-orb";o.innerHTML='<div class="ftgp-orb"></div><span class="ftgp-orb-txt">'+(lang==="en"?"Thinking...":"En train de réfléchir...")+'</span>';msgs.appendChild(o);msgs.scrollTop=msgs.scrollHeight;}
  function rmOrb(){var o=document.getElementById("ftgp-orb");if(o)o.remove();}

  function startRefine(msgId,q,path,step,lastA,adaptive){
    var elId="ftgp-ref-"+msgId+"-"+step;
    var el=document.createElement("div");el.className="ftgp-fm bot full";el.id=elId;
    el.innerHTML='<div class="ftgp-orb-wrap"><div class="ftgp-orb"></div><span class="ftgp-orb-txt">'+(adaptive?(lang==="en"?"Analysing...":"Analyse en cours..."):(lang==="en"?"Let\'s refine...":"Précisons ta demande..."))+'</span></div>';
    msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;
    fetch(VERCEL_URL+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:q,mode:"refine",session_id:sessionId,history:[],refine_step:step,refine_path:path,last_answer:lastA,lang:lang})})
    .then(function(r){return r.json();})
    .then(function(d){
      var el2=document.getElementById(elId);if(!el2)return;
      if(d.final_answer){el2.innerHTML='<div class="bubble" style="background:#fff;border-radius:18px 18px 18px 4px;box-shadow:0 2px 8px rgba(0,0,0,.07);font-size:14px;color:#160B47;line-height:1.65">'+md(d.final_answer)+'</div>';msgs.scrollTop=msgs.scrollHeight;return;}
      var sn=d.refine_step||step;var cur=adaptive?sn-10:sn;var prog=cur+"/4";
      var title=adaptive?(lang==="en"?"Dig deeper":"Affinons davantage"):(lang==="en"?"Refine your question":"Affinons ta demande");
      var optsDiv=document.createElement("div");optsDiv.className="ftgp-qopts";
      (d.options||[]).forEach(function(o){
        var btn=document.createElement("button");btn.className="ftgp-qopt";btn.type="button";btn.textContent=o;
        btn.onclick=function(){
          if(btn.disabled)return;
          optsDiv.querySelectorAll(".ftgp-qopt").forEach(function(b){b.disabled=true;b.style.opacity="0.4";b.style.pointerEvents="none";});
          btn.style.background="#0045B3";btn.style.color="#fff";btn.style.opacity="1";btn.style.borderColor="#0045B3";btn.style.pointerEvents="none";
          startRefine(msgId,q,path.concat([o]),sn+1,lastA,adaptive);
        };
        optsDiv.appendChild(btn);
      });
      var refineDiv=document.createElement("div");refineDiv.className="ftgp-refine";
      refineDiv.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700;font-size:13px;color:#160B47">'+title+'</div><div style="font-size:11px;color:#9BA8C0;background:#EEF2FF;padding:2px 8px;border-radius:20px">'+prog+'</div></div><div style="font-size:12px;color:#6B7A9F">'+(d.question||"")+'</div>';
      refineDiv.appendChild(optsDiv);el2.innerHTML="";el2.appendChild(refineDiv);msgs.scrollTop=msgs.scrollHeight;
    })
    .catch(function(){var el2=document.getElementById(elId);if(el2)el2.remove();});
  }

  function sendMsg(){
    var msg=input.value.trim();if(!msg)return;
    input.value="";suggsGone=true;suggsEl.innerHTML="";
    addUser(msg);history.push({role:"user",content:msg});save();
    addOrb();sendBtn.disabled=true;
    fetch(VERCEL_URL+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,session_id:sessionId,history:history,mode:"chat",unknown_count:unknownCount,lang:lang})})
    .then(function(r){return r.json();})
    .then(function(d){
      rmOrb();
      var intro=lang==="en"?"Here are all **French Tech Grand Paris** programmes:":"Voici tous les programmes de la **French Tech Grand Paris** :";
      if(isProgs(msg))addBot(intro,true,msg);else addBot(d.reply||"",false,msg);
      if(d.unknown_count!==undefined)unknownCount=d.unknown_count;
      if(d.escalade){setTimeout(function(){var ce=document.createElement("div");ce.className="ftgp-fm bot full";ce.innerHTML=buildContact();msgs.appendChild(ce);msgs.scrollTop=msgs.scrollHeight;},400);}
      history.push({role:"assistant",content:d.reply||""});save();sendBtn.disabled=false;
    })
    .catch(function(){rmOrb();addBot(lang==="en"?"Connection error. [Contact us](https://www.frenchtech-grandparis.com/contact).":"Erreur de connexion. [Contacte-nous](https://www.frenchtech-grandparis.com/contact).",false,msg);sendBtn.disabled=false;});
  }

  sendBtn.onclick=sendMsg;
  input.addEventListener("keydown",function(e){if(e.key==="Enter")sendMsg();});

})();
</script>
